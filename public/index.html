<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lite-Ollver-MD Session Generator</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Lite-Ollver-MD</h1>
      <p class="subtitle">WhatsApp Session Generator</p>

      <form id="pairForm">
        <label for="number">WhatsApp Number</label>
        <input
          id="number"
          name="number"
          type="text"
          placeholder="254740479599"
          autocomplete="off"
          required
        />

        <button type="submit" id="submitBtn">Generate Pairing Code</button>
      </form>

      <div class="status-box">
        <p><strong>Status:</strong> <span id="statusText">Idle</span></p>
        <p><strong>Pairing Code:</strong></p>
        <div class="code-box" id="pairingCode">----</div>
        <p class="note">
          After linking successfully, your session will be sent to the same WhatsApp number inbox.
        </p>
      </div>

      <div class="support-box">
        <p><strong>Need help?</strong></p>
        <p><a href="https://chat.whatsapp.com/JKF3XHbmKY47IQZc7d3LB2" target="_blank">Join Support Group</a></p>
        <p><a href="https://wa.me/254740479599" target="_blank">Contact Owner</a></p>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
